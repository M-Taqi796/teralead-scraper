<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeraLead Viewer</title>
    <script type="module" crossorigin src="/assets/results-7rL07eWa.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-BnkOoLKg.js">
    <link rel="modulepreload" crossorigin href="/assets/shared-DjaeoqTz.js">
    <link rel="modulepreload" crossorigin href="/assets/storage-7RVNEkts.js">
    <link rel="stylesheet" crossorigin href="/assets/results-C7KI1HWL.css">
  </head>
  <body>
    <main class="app">
      <header class="top" style="padding: 24px; background: #f8fafc; border-bottom: 1px solid #e2e8f0;">
        <div class="hero">
          <div class="brand-block">
            <div class="brand-copy">
              <div class="brand-row">
                <p class="eyebrow" style="color: #3b82f6; font-weight: bold; margin: 0; font-size: 1.2rem;">TeraLead</p>
                <span class="hero-chip" style="background: #eff6ff; color: #2563eb; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; margin-left: 8px;">Results Viewer</span>
              </div>
              <h1 style="margin: 8px 0; font-size: 1.5rem; color: #1e293b;">Review, qualify, and export your lead lists</h1>
              <p id="metaText" class="meta" style="color: #64748b; font-size: 0.9rem; margin: 0;">Waiting for data...</p>
            </div>
          </div>
        </div>
        <div class="actions">
          <input id="importFileInput" type="file" accept=".csv,text/csv" hidden />
          <button id="importBtn" type="button" style="display:none;">Import CSV</button>
          <button id="refreshBtn" type="button" style="padding: 8px 16px; border: 1px solid #cbd5e1; background: white; border-radius: 6px; cursor: pointer;">Refresh</button>
          <button id="exportBtn" type="button" class="primary" style="padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;" disabled>Download CSV</button>
        </div>
      </header>

      <section class="panel">
        <div class="summary">
          <span id="statusChip" class="status-chip idle">Idle</span>
          <span id="rowsCount">0 rows</span>
          <span id="colsCount">0 columns</span>
          <span id="renderHint"></span>
        </div>

        <p id="emptyState" class="empty">No rows yet. Run a scrape first.</p>

        <div id="tableWrap" class="table-wrap hidden">
          <table id="resultsTable">
            <colgroup id="tableCols"></colgroup>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>

      <p id="errorText" class="error"></p>
    </main>
  </body>
</html>
