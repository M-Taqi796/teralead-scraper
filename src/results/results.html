<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeraLead Viewer</title>
    <link rel="stylesheet" href="results.css" />
  </head>
  <body>
    <main class="app">
      <header class="top" style="padding: 24px; background: #3b82f6; border-bottom: 1px solid #2563eb;">
        <div class="hero">
          <div class="brand-block">
            <div class="brand-copy">
              <div class="brand-row" style="display: flex; align-items: center;">
                <i data-lucide="database" style="color: white; margin-right: 8px;"></i>
                <p class="eyebrow" style="color: white; font-weight: bold; margin: 0; font-size: 1.25rem;">TeraLead</p>
                <span class="hero-chip" style="background: rgba(255,255,255,0.2); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; margin-left: 8px;">Results Viewer</span>
              </div>
              <h1 style="margin: 8px 0; font-size: 1.5rem; color: white;">Review, qualify, and export your lead lists</h1>
              <p id="metaText" class="meta" style="color: rgba(255,255,255,0.9); font-size: 0.9rem; margin: 0;">Waiting for data...</p>
            </div>
          </div>
        </div>
        <div class="actions">
          <input id="importFileInput" type="file" accept=".csv,text/csv" hidden />
          <button id="importBtn" type="button" style="display:none;">Import CSV</button>
          <button id="refreshBtn" type="button" style="display: flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.4); background: transparent; color: white; border-radius: 6px; cursor: pointer; transition: background 0.2s;">
            <i data-lucide="refresh-cw" width="16" height="16"></i> Refresh
          </button>
          <button id="exportBtn" type="button" class="primary" style="display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: white; color: #3b82f6; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: opacity 0.2s;" disabled>
            <i data-lucide="download" width="16" height="16"></i> Download CSV
          </button>
        </div>
      </header>

      <section class="panel">
        <div class="summary">
          <span id="statusChip" class="status-chip idle">Idle</span>
          <span id="rowsCount">0 rows</span>
          <span id="colsCount">0 columns</span>
          <span id="renderHint"></span>
        </div>

        <p id="emptyState" class="empty">No rows yet. Run a scrape first.</p>

        <div id="tableWrap" class="table-wrap hidden">
          <table id="resultsTable">
            <colgroup id="tableCols"></colgroup>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>

      <p id="errorText" class="error"></p>
    </main>
    <script type="module" src="results.ts"></script>
  </body>
</html>
